version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kreaflow-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_LOCAL}
      POSTGRES_DB: kreaflow_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

volumes:
  pgdata:
    driver: local